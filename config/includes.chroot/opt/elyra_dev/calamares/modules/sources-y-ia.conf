---
# Módulo de Post-Instalación para Elyra Linux
i18n:
    name: "Configurando la Conciencia de Elyra y Repositorios..."

dontChroot: false

script:
    # 1. Inyectar los repositorios que configuramos (Debian 13 Trixie)
    - "-cp /opt/elyra_dev/sources.list /etc/apt/sources.list"
    
    # 2. Copiar el Script de Identidad a la nueva carpeta /opt del usuario
    - "-mkdir -p /opt/elyra_dev"
    - "-cp /opt/elyra_dev/elyra-identity-setup.sh /opt/elyra_dev/"
    - "-chmod +x /opt/elyra_dev/elyra-identity-setup.sh"

    # 3. Preparar la Base de Datos (Asegurar que MariaDB tenga la tabla al arrancar)
    # Nota: Esto asume que MariaDB se instala vía paquetes en el unpackfs
    - "-mysql -u root -e \"CREATE DATABASE IF NOT EXISTS elyra_core;\""

    # 4. Programar el inicio automático del setup de la IA
    # Creamos un archivo .desktop para que salte al primer inicio de sesión
    - "echo '[Desktop Entry]\nType=Application\nName=Elyra Setup\nExec=sudo /opt/elyra_dev/elyra-identity-setup.sh\nTerminal=true\nCategories=System;' > /etc/xdg/autostart/elyra-setup.desktop"
